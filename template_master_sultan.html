<script>
    // --- VARIABEL GLOBAL ---
    var GLOBAL_DATA = []; 
    var GLOBAL_HEADERS = [];
    var CACHED_TH = "";
    var CACHED_BL = "";

    $(document).ready(function() {
        initFilters();
    });

    // --- 1. FILTER LOGIC ---
    function initFilters(isRefresh = false) {
        if(isRefresh) Sultan.notif.loading();

        // [EDIT: PANGGIL BACKEND FILTER]
        google.script.run.withSuccessHandler(function(res) {
            if(isRefresh) Sultan.notif.tutup();
            var data = JSON.parse(res);
            
            var elThn = $('#filterTahun').empty().append('<option value="">- Tahun -</option>');
            if(data.years) data.years.forEach(y => elThn.append(`<option value="${y}">${y}</option>`));
            var elBln = $('#filterBulan').empty().append('<option value="">- Bulan -</option>');
            if(data.months) data.months.forEach(m => elBln.append(`<option value="${m}">${m}</option>`));

            // Auto Select Current Date
            var now = new Date();
            var curYear = now.getFullYear().toString();
            var mNames = ["Januari","Februari","Maret","April","Mei","Juni","Juli","Agustus","September","Oktober","November","Desember"];
            var curMonth = mNames[now.getMonth()];

            if ($("#filterTahun option[value='"+curYear+"']").length > 0) $('#filterTahun').val(curYear);
            if ($("#filterBulan option[value='"+curMonth+"']").length > 0) $('#filterBulan').val(curMonth);

            loadDropdownUnit();
        }).getFiltersBackend(); 
    }

    function loadDropdownUnit() {
        google.script.run.withSuccessHandler(function(units) {
            var el = $('#filterUnit');
            el.empty().append('<option value="SEMUA">- Semua Unit Kerja -</option>');
            if (units && units.length > 0) units.forEach(u => el.append(`<option value="${u}">${u}</option>`));
            el.prop('disabled', false);
        }).getUnitOptions(); 
    }

    // --- 2. FETCH DATA LOGIC ---
    function fetchData() {
        var th = $('#filterTahun').val();
        var bl = $('#filterBulan').val();
        
        if (!th || !bl) { Sultan.notif.info('Pilih Tahun dan Bulan dulu'); return; }

        if (th === CACHED_TH && bl === CACHED_BL && GLOBAL_DATA.length > 0) { filterLocalData(); return; }

        if ($.fn.DataTable.isDataTable('#tabelData')) { $('#tabelData').DataTable().destroy(); }
        $('#headTabel').hide();
        $('#bodyTabel').html('<tr><td class="text-center td-spinner" colspan="100%"><i class="fas fa-spinner fa-spin fa-3x text-maroon mb-3"></i><h6 class="text-muted font-weight-bold">Mengambil data...</h6></td></tr>');
        $('#btnCari').prop('disabled', true).html('<i class="fas fa-spinner fa-spin"></i>');

        // [EDIT: PANGGIL BACKEND DATA]
        google.script.run
            .withSuccessHandler(function(res) {
                var data = JSON.parse(res);
                if (data.error) {
                    $('#bodyTabel').html(`<tr><td class="text-center text-danger td-spinner font-weight-bold" colspan="100%">${data.error}</td></tr>`);
                } else {
                    GLOBAL_HEADERS = data.headers;
                    GLOBAL_DATA = data.rows; 
                    CACHED_TH = th;
                    CACHED_BL = bl;
                    filterLocalData(); 
                }
                $('#btnCari').prop('disabled', false).html('<i class="fas fa-search text-white"></i>');
            })
            .withFailureHandler(function(err) {
                $('#bodyTabel').html(`<tr><td class="text-center text-danger td-spinner" colspan="100%">Error: ${err.message}</td></tr>`);
                $('#btnCari').prop('disabled', false).html('<i class="fas fa-search text-white"></i>');
            })
            .getDataBackend(th, bl, "SEMUA"); 
    }

    // --- 3. FILTER LOCAL ---
    function filterLocalData() {
        var unit = $('#filterUnit').val(); 
        var rowsToShow = GLOBAL_DATA;
        if (unit && unit !== "SEMUA") {
            var searchUnit = String(unit).trim().toUpperCase();
            rowsToShow = GLOBAL_DATA.filter(function(row) {
                var lastIdx = row.length - 1; 
                var rowUnit = String(row[lastIdx]).trim().toUpperCase();
                return rowUnit === searchUnit;
            });
        }
        renderTable(rowsToShow);
    }

    // --- 4. RENDER TABLE ENGINE (CORE) ---
    function renderTable(rows) {
        if ($.fn.DataTable.isDataTable('#tabelData')) { $('#tabelData').DataTable().destroy(); }
        var tbody = $('#bodyTabel').empty();
        var thead = $('#headTabel').empty().show();

        if (!rows || rows.length === 0) {
            tbody.html(`<tr><td class="text-center td-spinner text-muted" colspan="100%"><div class="py-5"><i class="fas fa-search fa-3x mb-3 text-gray-300"></i><h6 class="font-weight-bold">Data tidak ditemukan.</h6></div></td></tr>`);
            return;
        }

        // A. HEADER (Dinamis dari Backend)
        var trHead = '<tr>';
        GLOBAL_HEADERS.forEach(function(h, idx) {
            // Kolom Pertama Wajib Sticky Left
            var cls = (idx === 0) ? "col-sticky-left" : ""; 
            trHead += `<th class="${cls}">${h}</th>`;
        });
        trHead += '</tr>';
        thead.html(trHead);

        // B. BODY (Loop Baris)
        var html = "";
        rows.forEach(function(row, i) {
            // Animasi Waterfall
            var delay = i * 0.03; 
            html += `<tr class="tr-animasi" style="animation-delay: ${delay}s">`;
            
            for (var colIdx = 0; colIdx < row.length; colIdx++) { 
                var val = row[colIdx];
                var display = val; 
                var styleClass = ""; 

                // =============================================================
                // [AREA KUSTOM: LOGIKA WARNA PER KOLOM]
                // =============================================================
                
                // 1. Kolom Identitas (Index 0) - Wajib Sticky & Putih
                if (colIdx === 0) {
                    styleClass += "col-sticky-left font-weight-bold text-dark bg-white ";
                }
                
                // 2. Contoh: Kolom Status (Badge)
                /* else if (colIdx === 3) {
                     var badgeCls = (val === 'AKTIF') ? 'badge-success' : 'badge-danger';
                     // Gunakan badge-sultan-status dari CSS
                     display = `<span class="badge badge-sultan-status ${badgeCls}">${val}</span>`;
                } 
                */

                // 3. Contoh: Kolom Aksi (Tombol Bulat)
                /*
                else if (colIdx === 5) {
                    styleClass += "td-aksi";
                    display = `
                        <button class="btn-icon-sultan btn-icon-sultan-warning" onclick="editData('${i}')" title="Edit"><i class="fas fa-pencil-alt"></i></button>
                    `;
                }
                */

                // =============================================================

                // Sanitasi Data Kosong (Kecuali kolom Aksi)
                if ((!display || display == "0" || display == "") && !styleClass.includes('td-aksi')) { 
                    display = "-";
                }

                html += `<td class="${styleClass}">${display}</td>`;
            }
            html += '</tr>';
        });
        tbody.html(html);

        // C. INIT DATATABLES (LAYOUT BAKU)
        $('#tabelData').DataTable({
            "ordering": false, 
            "pageLength": 10, 
            "autoWidth": false, 
            "scrollX": false, // Handled by wrapper
            "language": { "url": "//cdn.datatables.net/plug-ins/1.10.25/i18n/Indonesian.json", "search": "", "searchPlaceholder": "Cari data..." },
            "dom": "<'row mb-2'<'col-sm-12 col-md-6'l><'col-sm-12 col-md-6'f>>" +
                   "<'row'<'col-sm-12'<'table-responsive't>>>" + 
                   "<'row mt-3'<'col-sm-12 col-md-5 text-muted small'i><'col-sm-12 col-md-7'p>>",
            "drawCallback": function() { $('[data-toggle="tooltip"]').tooltip(); }
        });
    }

    // --- 5. FUNGSI INTERAKSI ---
    function bukaModalTambah() { $('#modalTambah').modal('show'); }
    
    function submitTambah(e) { 
        e.preventDefault(); 
        // [EDIT: LOGIKA SIMPAN]
        Sultan.notif.sukses('Data berhasil disimpan'); 
        $('#modalTambah').modal('hide'); 
    }

    function hapusData(idx) {
        Sultan.konfirmasi({ judul: 'Hapus Data?', teks: 'Data baris ke-'+idx+' akan dihapus.' }, function() {
             // [EDIT: LOGIKA HAPUS KE BACKEND]
             Sultan.notif.sukses('Data berhasil dihapus');
        });
    }
</script>
